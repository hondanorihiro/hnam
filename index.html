<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>DNA AR</title>
  <style>
    * { margin: 0; padding: 0; }
    model-viewer { width: 100vw; height: 100vh; background: #000; }
  </style>
</head>
<body>
  <model-viewer
    src="./cell_dna.glb"
   
    ar
    ar-modes="webxr scene-viewer quick-look"
    camera-controls
    auto-rotate
    shadow-intensity="1">

    <button slot="ar-button" style="
      position: absolute;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%);
      padding: 16px 28px;
      font-size: 18px;
      border-radius: 999px;
      border: none;
      background: white;
      color: black;
      font-weight: bold;
      ">
      ARでDNAを見る
    </button>


  </model-viewer>
  <script type="module"
    src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.0.0/model-viewer.min.js">
  </script>
</body>
</html>
